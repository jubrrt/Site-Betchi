      max-width: 860px;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 14px max(28px, env(safe-area-inset-bottom));
    }

    .screen { display: none; }
    .screen.active { display: block; }

      border: 1px solid var(--line);
      border-radius: var(--radius);
