<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETCHI.FR | Terminal de Liaison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Gaegu:wght@400;700&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --sky-bg: #f0f4f8; --airport-dark: #1a1a1a; }
        body { 
            background-color: var(--sky-bg); 
            color: #2c3e50; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            margin: 0;
        }
        .naif { font-family: 'Gaegu', cursive; }
        
        /* WALLPAPER FIXE */
        .wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; opacity: 0.15;
            display: grid; grid-template-columns: repeat(5, 1fr);
            padding: 20px; gap: 40px; pointer-events: none;
        }
        .icon-static { font-size: 2rem; display: flex; justify-content: center; align-items: center; }

        /* TRAJECTOIRE COEUR ET AVION */
        .sky-svg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
        .heart-path {
            fill: none;
            stroke: rgba(127, 179, 213, 0.4);
            stroke-width: 3;
            stroke-dasharray: 8, 12;
            stroke-linecap: round;
        }
        .plane-on-path { offset-path: path('M 500 300 C 500 150 250 150 250 350 C 250 550 500 750 500 750 C 500 750 750 550 750 350 C 750 150 500 150 500 300'); animation: followPath 15s linear infinite; font-size: 2.5rem; position: absolute; }
        @keyframes followPath { 0% { offset-distance: 0%; transform: rotate(0deg); } 100% { offset-distance: 100%; } }

        /* TITRE TERMINAL STYLE AEROPORT */
        .terminal-header {
            font-family: 'JetBrains Mono', monospace;
            background: #222; color: #ff9d00;
            padding: 10px 20px; border-radius: 8px;
            text-transform: uppercase; border: 3px solid #333;
            box-shadow: inset 0 0 10px rgba(255,157,0,0.2);
            display: inline-block;
        }

        /* FLAPS FIXES */
        .flap-board { display: flex; gap: 10px; justify-content: center; }
        .flap {
            width: 55px; height: 80px; background: #222; border-radius: 6px;
            color: #eee; font-size: 2.5rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            position: relative; border: 1px solid #000;
        }
        .flap::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #000; }
        .spinning { animation: flap-flip 0.15s infinite; }
        @keyframes flap-flip { 0% { transform: rotateX(0deg); } 50% { transform: rotateX(-90deg); } 100% { transform: rotateX(0deg); } }

        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); border-radius: 3rem; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="wallpaper">
        <div class="icon-static">☀️</div><div class="icon-static">🎵</div><div class="icon-static">🌮</div><div class="icon-static">🍹</div><div class="icon-static">🥾</div>
        <div class="icon-static">🔥</div><div class="icon-static">🍆</div><div class="icon-static">❤️</div><div class="icon-static">✨</div><div class="icon-static">☀️</div>
    </div>

    <svg class="sky-svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
        <path id="heartPath" class="heart-path" d="M 500 300 C 500 150 250 150 250 350 C 250 550 500 750 500 750 C 500 750 750 550 750 350 C 750 150 500 150 500 300" />
    </svg>
    <div class="plane-on-path">✈️</div>

    <div id="login-screen" class="w-full max-w-md mt-10 space-y-8">
        <div class="text-center">
            <div class="terminal-header text-[10px] sm:text-xs tracking-tighter">
                TERMINAL DE LIAISON BETCHI.FR<br>ESPACE AÉRIEN SÉCURISÉ ET PRIVÉ
            </div>
        </div>

        <div class="glass p-8 space-y-8 shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-2 uppercase italic">
                        Une personne a vraiment très envie de PRENDRE l'avion. Quelle est sa date de naissance ?
                    </label>
                    <input type="text" id="birthday" placeholder="ex : 20/02/89" class="w-full bg-white/50 border-none rounded-2xl p-5 text-slate-700 shadow-sm outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-sky-300">
                </div>
                <div>
                    <div class="flex items-center mb-2">
                        <label class="block text-[11px] font-bold text-slate-500 uppercase italic mr-2">¿Que hora son?</label>
                        <span>🎵</span>
                    </div>
                    <input type="text" id="joke" placeholder="Demander à Manu Chao" class="w-full bg-white/50 border-none rounded-2xl p-5 text-slate-700 shadow-sm outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-sky-300">
                </div>
            </div>

            <div class="flap-board">
                <div class="flap" id="f1">?</div>
                <div class="flap" id="f2">?</div>
                <div class="flap" id="f3">?</div>
                <div class="flap" id="f4">?</div>
            </div>

            <button id="login-btn" onclick="attemptLogin()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl tracking-widest text-sm uppercase active:scale-95 transition-all">Vérification passager</button>
        </div>
    </div>

    <div id="home-screen" class="hidden w-full max-w-md mt-10">
        <div class="glass p-8 text-center">
            <h1 class="text-3xl font-black text-slate-800 mb-4">BIENVENUE À BORD</h1>
            <p class="naif text-2xl text-sky-600 italic">"Idéal pour partager un melon à la plage"</p>
        </div>
    </div>

    <script>
        function attemptLogin() {
            const bday = document.getElementById('birthday').value;
            const joke = document.getElementById('joke').value.toLowerCase();
            const btn = document.getElementById('login-btn');
            
            if(bday.includes("16/05") && (joke.includes("mi corazon") || joke.includes("corazon"))) {
                btn.innerText = "IDENTITÉ CONFIRMÉE";
                btn.style.backgroundColor = "#10b981";

                // Lancement de l'animation des flaps au succès
                const result = ['O', 'K', 'A', 'Y'];
                [1,2,3,4].forEach((id, i) => {
                    const flap = document.getElementById(`f${id}`);
                    flap.classList.add('spinning');
                    setTimeout(() => {
                        flap.classList.remove('spinning');
                        flap.innerText = result[i];
                        flap.style.color = "#10b981";
                    }, i * 400 + 1000);
                });
                
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('home-screen').classList.remove('hidden');
                }, 4000);
            } else {
                btn.innerText = "ERREUR DE SÉCURITÉ";
                btn.style.backgroundColor = "#ef4444";
                setTimeout(() => {
                    btn.innerText = "Vérification passager";
                    btn.style.backgroundColor = "#0f172a";
                }, 1500);
            }
        }
    </script>
</body>
</html>
