<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETCHI.FR | Terminal de Liaison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --betchi-dark: #070a16; --betchi-blue: #0088ff; }
        body { 
            background: var(--betchi-dark); 
            color: #bdc5d1; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .airport-typo { font-family: 'Roboto Mono', monospace; text-transform: uppercase; }
        .betchi-title { font-size: 5rem; font-weight: 900; color: var(--betchi-blue); tracking-tight; }
        @media (max-width: 640px) { .betchi-title { font-size: 3rem; } }

        /* Animation des volets de sécurité (Split-flap style) */
        .flap-board { display: flex; gap: 8px; justify-content: center; margin: 30px 0; }
        .flap {
            width: 60px; height: 85px; background: #222; border-radius: 6px;
            color: white; font-size: 2.8rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            position: relative; border-bottom: 2px solid #000;
        }
        .flap::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(0,0,0,0.5); }
        .spining { animation: flip 0.2s infinite; }
        @keyframes flip { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(-180deg); } }

        /* Transition entre écrans */
        .page-transition { transition: all 0.5s ease-in-out; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen text-center space-y-16">

    <div id="sky-animation" class="fixed top-0 left-0 w-full h-full -z-10 hidden opacity-60">
        </div>

    <div id="login-block" class="space-y-10 page-transition">
        <div class="space-y-2">
            <p class="airport-typo text-xs tracking-[0.4em] font-normal text-slate-400">Terminal de Liaison</p>
            <h1 class="betchi-title">BETCHI.FR</h1>
            <p class="naif text-sm sm:text-lg font-bold text-slate-500 italic">Espace Aérien Privé & Sécurisé</p>
        </div>

        <div class="max-w-md mx-auto space-y-6">
            <div class="space-y-4">
                <input type="date" id="pass-birthday" placeholder="Date de naissance" class="w-full bg-slate-800 border-none rounded-2xl p-5 text-white shadow-sm outline-none ring-1 ring-slate-700 focus:ring-2 focus:ring-sky-500">
                <input type="text" id="pass-joke" placeholder="Votre private joke (Demander à Manu Chao)" class="w-full bg-slate-800 border-none rounded-2xl p-5 text-white shadow-sm outline-none ring-1 ring-slate-700 focus:ring-2 focus:ring-sky-500">
            </div>

            <div class="flap-board">
                <div class="flap" id="f1">?</div>
                <div class="flap" id="f2">?</div>
                <div class="flap" id="f3">?</div>
                <div class="flap" id="f4">?</div>
            </div>

            <button onclick="attemptLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl active:scale-95 transition-all text-sm tracking-widest uppercase shadow-lg">Embarquement immédiat</button>
        </div>
    </div>

    <div id="home-block" class="hidden w-full max-w-md page-transition space-y-10">
        </div>

    <script>
        function attemptLogin() {
            const bday = document.getElementById('pass-birthday').value;
            const joke = document.getElementById('pass-joke').value.toLowerCase();
            
            if(bday.includes("16/05") && (joke.includes("mi corazon") || joke.includes("corazon"))) {
                // Succès : Animation des flaps
                const res = ['O', 'K', 'A', 'Y'];
                [1,2,3,4].forEach((id, i) => {
                    const flap = document.getElementById(`f${id}`);
                    flap.classList.add('spining');
                    setTimeout(() => {
                        flap.classList.remove('spining');
                        flap.innerText = res[i];
                        flap.style.color = '#10b981';
                    }, i * 400 + 1000);
                });
                
                // Bascule d'écrans après l'animation
                setTimeout(() => {
                    document.getElementById('login-block').classList.add('hidden');
                    document.getElementById('home-block').classList.remove('hidden');
                    document.getElementById('sky-animation').classList.remove('hidden');
                }, 3500);
            } else {
                alert("Identité non confirmée. Vérifiez vos documents de bord.");
            }
        }
    </script>
</body>
</html>
