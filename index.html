<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BETCHI.FR | Terminal de Liaison</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
  <style>
    :root { --betchi-dark: #070a16; --betchi-blue: #0088ff; --betchi-red: #ef4444; --betchi-green: #22c55e; }
    * { box-sizing: border-box; }
    body { background: var(--betchi-dark); color: #bdc5d1; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
    .screen { min-height: 100vh; padding: 24px; }
    .hidden { display: none !important; }
    .betchi-title { font-size: 3.15rem; font-weight: 900; color: var(--betchi-blue); letter-spacing: -0.05em; line-height: 1.1; }
    .betchi-title-sm { font-size: 2.5rem; font-weight: 900; color: var(--betchi-blue); letter-spacing: -0.05em; line-height: 1.1; }
    .terminal-subtitle, .airport-label, .info-label, .btn-nav { font-family: 'Roboto Mono', monospace; }
    .terminal-subtitle { text-transform: uppercase; font-size: 1.2rem; letter-spacing: 0.1em; font-weight: 300; color: #64748b; margin-top: 10px; line-height: 1.5; }
    .airport-label { color: #ffffff; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .info-label { text-transform: uppercase; font-size: 11px; color: #64748b; letter-spacing: 0.15em; }
    .info-value { color: white; font-weight: 900; font-size: 1.5rem; line-height: 1.2; text-transform: uppercase; }
    .icon-blue { filter: invert(37%) sepia(93%) saturate(3958%) hue-rotate(196deg) brightness(101%) contrast(107%); }
    .panel { width: 100%; max-width: 520px; margin: 0 auto; }
    .input-field, select { width: 100%; background: rgba(15, 23, 42, 0.75); border: 1px solid rgba(51, 65, 85, 0.5); color: white; border-radius: 1rem; padding: 16px 18px; outline: none; }
    .primary-btn { width: 100%; background: #2563eb; color: white; font-weight: 900; padding: 20px; border-radius: 1rem; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .flap-board { display: flex; gap: 8px; justify-content: center; margin-top: 30px; }
    .flap { width: 50px; height: 75px; background: #1a1e2e; border-radius: 6px; color: white; font-size: 2rem; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 3px solid #000; }
    .spinning { animation: flip 0.15s infinite; }
    @keyframes flip { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(-180deg); } }
    .success-bar { background: rgba(255,255,255,0.1); height: 4px; border-radius: 10px; width: 50%; margin: 12px auto 0; overflow: hidden; }
    .success-fill { background: var(--betchi-red); height: 100%; transition: width 0.5s ease-out; }
    .select-invisible { background: transparent !important; border: none !important; border-bottom: 1px solid rgba(51, 65, 85, 0.5) !important; text-align-last: center; cursor: pointer; appearance: none; }
    select option { background: var(--betchi-dark); color: white; }
    .btn-nav { background: transparent; border: 1px solid rgba(0, 136, 255, 0.4); color: white; padding: 20px; border-radius: 1rem; width: 100%; font-weight: 700; text-transform: uppercase; cursor: pointer; }
  </style>
</head>
<body>

  <section id="login-screen" class="screen flex items-center justify-center">
    <div class="panel text-center">
      <div class="mb-10 flex flex-col items-center">
        <img src="https://static.thenounproject.com/png/178847-200.png" class="w-24 h-auto mb-6 icon-blue opacity-90">
        <h1 class="betchi-title">BETCHI.FR</h1>
        <p class="terminal-subtitle">Terminal de liaison<br>aérien privé</p>
      </div>
      <div class="max-w-sm mx-auto space-y-6">
        <div class="text-left"><label class="airport-label">Date de naissance du pilote ?</label>
        <input type="text" id="pass-bday" placeholder="ex : 16/05/1988" class="input-field"></div>
        <div class="text-left"><label class="airport-label">QUE HORA SON? 🎵</label>
        <input type="text" id="pass-joke" placeholder="ex : mi corazon" class="input-field"></div>
        <button id="login-btn" class="primary-btn">Accéder</button>
        <div class="flap-board">
          <div class="flap" id="f1">?</div><div class="flap" id="f2">?</div><div class="flap" id="f3">?</div><div class="flap" id="f4">?</div><div class="flap" id="f5">?</div>
        </div>
      </div>
    </div>
  </section>

  <section id="dashboard-screen" class="screen hidden">
    <div class="panel text-center">
      <header class="flex flex-col items-center mb-10">
        <img src="https://static.thenounproject.com/png/178847-200.png" class="w-12 h-auto mb-2 icon-blue opacity-90">
        <h1 class="betchi-title-sm">BETCHI.FR</h1>
      </header>
      <div class="space-y-10 mb-14">
        <div><p class="info-label">Destination</p><p class="info-value text-blue-500">Big Love</p></div>
        <div><p class="info-label">État de l'appareil</p>
          <select id="select-appareil" class="info-value select-invisible">
            <option value="2">Épave</option><option value="45">Paré au décollage</option><option value="85">Rafale Ready</option>
          </select>
        </div>
        <div><p class="info-label">État du pilote</p>
          <select id="select-pilote" class="info-value select-invisible">
            <option value="1.7">Zone de turbulence</option><option value="10.3">Redresse la barre</option><option value="15">Maverick Mode</option>
          </select>
        </div>
        <div><p class="info-label">Taux de réussite estimé</p><p id="score-val" class="info-value">3.7%</p>
          <div class="success-bar"><div id="score-bar" class="success-fill" style="width: 3.7%;"></div></div>
        </div>
      </div>
      <button class="btn-nav" onclick="location.reload()">🔄 Actualiser la liaison</button>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- REMPLACE PAR TES CLÉS ---
    const firebaseConfig = {
      apiKey: "AIzaSyA8g_oLQ5X7aiGK_m9eNos680MroG6djKY",
      authDomain: "betchi-b33f4.firebaseapp.com",
      databaseURL: "https://betchi-b33f4-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "betchi-b33f4",
      storageBucket: "betchi-b33f4.firebasestorage.app",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Fonction de changement d'écran
    function showScreen(id) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
    }

    // Sauvegarde vers Firebase
    window.updateScore = function() {
      const appVal = document.getElementById('select-appareil').value;
      const pilVal = document.getElementById('select-pilote').value;
      set(ref(db, 'etat_vol/'), { appareil: appVal, pilote: pilVal });
    };

    // Lecture de Firebase (Temps réel)
    onValue(ref(db, 'etat_vol/'), (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('select-appareil').value = data.appareil;
        document.getElementById('select-pilote').value = data.pilote;
        const total = (parseFloat(data.appareil) + parseFloat(data.pilote)).toFixed(1);
        document.getElementById('score-val').innerText = total + "%";
        document.getElementById('score-bar').style.width = total + "%";
        document.getElementById('score-bar').style.background = (total > 90) ? 'var(--betchi-green)' : 'var(--betchi-red)';
      }
    });

    // Validation Login
    function validateAccess() {
      const bday = document.getElementById('pass-bday').value;
      const joke = document.getElementById('pass-joke').value.toLowerCase();
      const btn = document.getElementById('login-btn');

      if (bday.includes("16/05") && (joke.includes("corazon") || joke.includes("corazón"))) {
        btn.innerText = "Identification...";
        btn.disabled = true;

        const symbols = ['✈️', '☀️', '❤️', '🍷', '🍑'];
        [1,2,3,4,5].forEach((id, i) => {
          const flap = document.getElementById('f' + id);
          flap.classList.add('spinning');
          setTimeout(() => {
            flap.classList.remove('spinning');
            flap.innerText = symbols[i];
            flap.style.borderColor = "#0088ff";
          }, 1000 + (i * 350));
        });

        setTimeout(() => { showScreen('dashboard-screen'); }, 3500);
      } else {
        btn.innerText = "ÉCHEC DE SÉCURITÉ";
        btn.style.backgroundColor = "#ef4444";
        setTimeout(() => {
          btn.innerText = "Accéder";
          btn.style.backgroundColor = "#2563eb";
        }, 1500);
      }
    }

    // Liaison des boutons (Obligatoire en mode module)
    document.getElementById('login-btn').onclick = validateAccess;
    document.getElementById('select-appareil').onchange = window.updateScore;
    document.getElementById('select-pilote').onchange = window.updateScore;

  </script>
</body>
</html>
