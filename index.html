<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETCHI.FR | Terminal de Liaison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --betchi-dark: #070a16; --betchi-blue: #0088ff; }
        body { 
            background: var(--betchi-dark); 
            color: #bdc5d1; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
            overflow: hidden;
        }
        
        .betchi-title { 
            font-size: 5rem; 
            font-weight: 900; 
            color: var(--betchi-blue); 
            letter-spacing: -0.05em;
            line-height: 1;
        }
        
        @media (max-width: 640px) { .betchi-title { font-size: 3.5rem; } }

        .airport-typo { font-family: 'Roboto Mono', monospace; text-transform: uppercase; }

        /* VOLETS (SPLIT-FLAP) */
        .flap-board { display: flex; gap: 10px; justify-content: center; margin: 40px 0; }
        .flap {
            width: 65px; height: 90px; background: #1a1e2e; border-radius: 8px;
            color: white; font-size: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            position: relative; border-bottom: 3px solid #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .flap::after { 
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; 
            background: rgba(0,0,0,0.8); z-index: 2; 
        }

        .spinning { animation: flip 0.15s infinite; }
        @keyframes flip { 
            0% { transform: rotateX(0deg); background: #1a1e2e; } 
            50% { transform: rotateX(-90deg); background: #070a16; }
            100% { transform: rotateX(0deg); background: #1a1e2e; } 
        }

        .hidden { display: none; }
        
        input { transition: all 0.3s ease; }
        input:focus { ring: 2px solid var(--betchi-blue); }
    </style>
</head>
<body class="p-6">

    <div id="login-screen" class="w-full max-w-xl text-center space-y-12">
        
        <div class="space-y-2">
            <p class="airport-typo text-xs tracking-[0.5em] text-slate-500 font-bold">Terminal de Liaison</p>
            <h1 class="betchi-title">BETCHI.FR</h1>
            <p class="text-lg text-slate-400 font-medium italic">Espace Aérien Privé & Sécurisé</p>
        </div>

        <div class="max-w-sm mx-auto space-y-4">
            <input type="date" id="pass-bday" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl p-5 text-white outline-none">
            <input type="text" id="pass-joke" placeholder="¿Que hora son?" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl p-5 text-white outline-none">
